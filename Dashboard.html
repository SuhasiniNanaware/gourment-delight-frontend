<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shivanjali Park - Admin Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-client@2"></script>
    <script src="supabase-init.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f8f9fa; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #ddd; padding-bottom: 10px; }
        .logout-btn { padding: 8px 15px; background-color: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .logout-btn:hover { background-color: #c82333; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: white; padding: 20px; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 4px solid #007bff; }
        .card h4 { margin: 0 0 10px 0; color: #333; }
        .card p { margin: 5px 0; color: #565656; font-size: 14px; }
    </style>
</head>
<body>

<div id="dashboard-content" style="display: none;">
    <div class="header">
        <h2>Shivanjali Park - Inquiries Dashboard</h2>
        <button class="logout-btn" id="logout-btn">Log Out</button>
    </div>

    <h3>Active Customer Leads (CRUD Read)</h3>
    <div id="inquiries-list">Loading inquiries...</div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", async () => {
        // 1. Verify valid JWT Session exists
        const { data: { session }, error } = await window.supabase.auth.getSession();

        if (error || !session) {
            alert("Access Denied! Real-time JWT token missing. Please log in.");
            window.location.href = "login.html";
            return;
        }

        // 2. Token verified successfully! Make dashboard visible
        document.getElementById("dashboard-content").style.display = "block";
        fetchInquiries();

        // 3. Handle user logout
        document.getElementById("logout-btn").addEventListener("click", async () => {
            await window.supabase.auth.signOut();
            alert("Logged out successfully.");
            window.location.href = "login.html";
        });
    });

    // 4. CRUD Read function using Supabase SDK
    async function fetchInquiries() {
        const container = document.getElementById("inquiries-list");
        
        const { data, error } = await window.supabase
            .from('inquiries')
            .select('*');

        if (error) {
            container.innerHTML = `<p style="color:red;">Error fetching data: ${error.message}</p>`;
            return;
        }

        if (data.length === 0) {
            container.innerHTML = "<p>No inquiries found in the database.</p>";
            return;
        }

        // Render data cards onto the page
        container.innerHTML = `
            <div class="grid">
                ${data.map(item => `
                    <div class="card">
                        <h4>${item.name || 'Anonymous User'}</h4>
                        <p><strong>Email:</strong> ${item.email || 'N/A'}</p>
                        <p><strong>Phone:</strong> ${item.phone || 'N/A'}</p>
                        <p><strong>Message:</strong> ${item.message || 'No message provided.'}</p>
                    </div>
                `).join('')}
            </div>
        `;
    }
</script>

</body>
</html>
